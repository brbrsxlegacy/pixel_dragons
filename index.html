<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Dragon Island L2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ui">
  <div class="title">🐉 Pixel Dragon Island</div>
  <div class="wallet">
    🪙 <span id="gold">800</span>
    🍖 <span id="food">150</span>
    💎 <span id="gem">30</span>
  </div>
  <button id="marketBtn">MARKET</button>
</div>

<canvas id="game"></canvas>

<div id="market" class="hidden">
  <h2>Market</h2>
  <button data-item="habitat">Habitat - 150 🪙</button>
  <button data-item="fire">Ateş Ejderhası - 5 💎</button>
  <button data-item="water">Su Ejderhası - 5 💎</button>
  <button data-item="nature">Doğa Ejderhası - 5 💎</button>
  <button data-item="electric">Elektrik Ejderhası - 8 💎</button>
  <button data-item="shadow">Gölge Ejderhası - 10 💎</button>
  <button id="closeBtn">Kapat</button>
</div>

<div id="info">Market’ten seçim yap, adadaki kareye tıkla.</div>

<script src="game.js"></script>
</body>
</html>
